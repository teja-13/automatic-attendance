services:
  - type: web
    name: attendance-web
    env: python
    plan: starter
    buildCommand: |
      pip install --upgrade pip setuptools wheel
      pip install "cmake>=3.29.0"
      export CMAKE_BUILD_PARALLEL_LEVEL=1
      export MAX_JOBS=1
      pip install -r requirements.txt
    startCommand: gunicorn attendance_web:app --bind 0.0.0.0:$PORT --workers 1 --threads 2 --timeout 120
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.8
      - key: FACE_DETECTION_MODEL
        value: hog
      - key: REQUIRE_CUDA
        value: "0"
      - key: OMP_NUM_THREADS
        value: "1"
      - key: OPENBLAS_NUM_THREADS
        value: "1"
      - key: MKL_NUM_THREADS
        value: "1"
      - key: NUMEXPR_NUM_THREADS
        value: "1"
