services:
  - type: web
    name: attendance-web
    env: python
    plan: starter
    buildCommand: |
      pip install --upgrade pip setuptools wheel
      pip install -r requirements.txt
      if ! pip install dlib-bin==19.24.6; then
        export CMAKE_BUILD_PARALLEL_LEVEL=1
        export MAX_JOBS=1
        pip install dlib==19.24.2
      fi
      pip install face-recognition==1.3.0 --no-deps
    startCommand: gunicorn attendance_web:app --workers 1 --threads 2 --timeout 120
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: OMP_NUM_THREADS
        value: "1"
      - key: OPENBLAS_NUM_THREADS
        value: "1"
      - key: MKL_NUM_THREADS
        value: "1"
      - key: NUMEXPR_NUM_THREADS
        value: "1"
